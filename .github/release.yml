changelog:
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - major
    - title : "🪛 Changes"
      labels:
        - "*"
      exclude:
        labels:
          - major
          - dependencies
          - release
          - CICD
    - title: "🤖 CI / CD"
      labels:
        - CICD
    - title: "🔧 Dependencies"
      labels:
        - dependencies
      exclude:
        labels:
          - major
